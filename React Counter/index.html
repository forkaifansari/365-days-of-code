<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day 15 — React Counter</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;
      --border:#30363d;--text:#e6edf3;--dim:#8b949e;
      --green:#3fb950;--blue:#58a6ff;--red:#f85149;
      --orange:#ffa657;--purple:#bc8cff;--gold:#e3b341;
    }
    body{
      background:var(--bg);color:var(--text);
      font-family:'DM Mono',monospace;
      min-height:100vh;display:flex;
      flex-direction:column;align-items:center;
      justify-content:center;padding:20px;
      background-image:radial-gradient(ellipse 60% 50% at 50% 40%,rgba(88,166,255,.04),transparent);
    }
    #root{width:100%;max-width:480px}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── HISTORY ITEM ──
    function HistoryItem({ item, index, onRestore }) {
      const colors = {
        increment: 'var(--green)',
        decrement: 'var(--red)',
        reset: 'var(--dim)',
        set: 'var(--blue)',
        undo: 'var(--orange)',
      };
      const icons = {
        increment: '↑', decrement: '↓',
        reset: '↺', set: '✎', undo: '⤺',
      };
      return (
        <div style={{
          display:'flex', alignItems:'center', gap:'10px',
          padding:'8px 14px', borderBottom:'1px solid var(--border)',
          fontSize:'11px', cursor:'pointer',
          transition:'background .15s',
        }}
        onMouseEnter={e=>e.currentTarget.style.background='var(--bg3)'}
        onMouseLeave={e=>e.currentTarget.style.background='transparent'}
        onClick={()=>onRestore(item.value)}
        title="Click to restore this value"
        >
          <span style={{color:colors[item.action],fontSize:'14px',width:'16px',textAlign:'center'}}>
            {icons[item.action]}
          </span>
          <span style={{color:'var(--dim)',minWidth:'28px'}}>#{index+1}</span>
          <span style={{color:'var(--text)',fontWeight:500,minWidth:'40px'}}>{item.value}</span>
          <span style={{color:'var(--dim)',flex:1}}>{item.label}</span>
          <span style={{color:'var(--dim)',fontSize:'9px'}}>{item.time}</span>
        </div>
      );
    }

    // ── MAIN APP ──
    function App() {
      const [count, setCount] = useState(0);
      const [history, setHistory] = useState([]);
      const [step, setStep] = useState(1);
      const [showHistory, setShowHistory] = useState(true);
      const [animate, setAnimate] = useState('');
      const [customVal, setCustomVal] = useState('');
      const [showCustom, setShowCustom] = useState(false);

      const now = () => new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});

      const addHistory = (action, value, label) => {
        setHistory(prev => [{action, value, label, time: now()}, ...prev].slice(0, 20));
      };

      const triggerAnim = (dir) => {
        setAnimate(dir);
        setTimeout(() => setAnimate(''), 300);
      };

      const increment = useCallback(() => {
        setCount(c => {
          const n = c + step;
          addHistory('increment', n, `+ ${step} → ${n}`);
          return n;
        });
        triggerAnim('up');
      }, [step]);

      const decrement = useCallback(() => {
        setCount(c => {
          const n = c - step;
          addHistory('decrement', n, `− ${step} → ${n}`);
          return n;
        });
        triggerAnim('down');
      }, [step]);

      const reset = () => {
        addHistory('reset', 0, `reset from ${count} → 0`);
        setCount(0);
        triggerAnim('reset');
      };

      const undo = () => {
        if(history.length < 2) return;
        const prev = history[1].value;
        setHistory(h => h.slice(1));
        setCount(prev);
        addHistory('undo', prev, `undo → ${prev}`);
      };

      const restore = (val) => {
        addHistory('set', val, `restore → ${val}`);
        setCount(val);
        triggerAnim('up');
      };

      const applyCustom = () => {
        const v = parseInt(customVal);
        if(isNaN(v)) return;
        addHistory('set', v, `set to ${v}`);
        setCount(v);
        setCustomVal('');
        setShowCustom(false);
        triggerAnim('up');
      };

      // keyboard
      useEffect(() => {
        const handler = (e) => {
          if(e.target.tagName === 'INPUT') return;
          if(e.key === 'ArrowUp' || e.key === '+') increment();
          if(e.key === 'ArrowDown' || e.key === '-') decrement();
          if(e.key === 'r') reset();
          if(e.key === 'z' && e.ctrlKey){ e.preventDefault(); undo(); }
        };
        window.addEventListener('keydown', handler);
        return () => window.removeEventListener('keydown', handler);
      }, [increment, decrement]);

      // color based on value
      const getColor = () => {
        if(count > 0) return 'var(--green)';
        if(count < 0) return 'var(--red)';
        return 'var(--text)';
      };

      const displayStyle = {
        transform: animate === 'up' ? 'translateY(-6px)' :
                   animate === 'down' ? 'translateY(6px)' :
                   animate === 'reset' ? 'scale(0.9)' : 'none',
        transition: 'transform .2s cubic-bezier(.34,1.56,.64,1), color .3s',
        color: getColor(),
      };

      return (
        <div>
          {/* Header */}
          <div style={{textAlign:'center',marginBottom:'28px'}}>
            <div style={{
              fontSize:'9px',letterSpacing:'.3em',textTransform:'uppercase',
              color:'var(--dim)',border:'1px solid var(--border)',
              padding:'4px 14px',borderRadius:'2px',display:'inline-block',marginBottom:'12px'
            }}>Day 15 of 365 · First React Project</div>
            <div style={{
              fontFamily:'Cormorant Garamond, serif',
              fontWeight:700,fontStyle:'italic',
              fontSize:'2rem',color:'var(--text)'
            }}>React Counter</div>
            <div style={{fontSize:'10px',color:'var(--dim)',letterSpacing:'.1em',marginTop:'4px'}}>
              with undo history · step control · keyboard support
            </div>
          </div>

          {/* Main Card */}
          <div style={{
            background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:'16px',overflow:'hidden',marginBottom:'12px',
          }}>
            {/* Display */}
            <div style={{
              padding:'40px 32px',textAlign:'center',
              borderBottom:'1px solid var(--border)',
              background:'var(--bg)',position:'relative',
            }}>
              {/* glow */}
              <div style={{
                position:'absolute',inset:0,
                background:`radial-gradient(ellipse 60% 60% at 50% 50%, ${count>0?'rgba(63,185,80,.06)':count<0?'rgba(248,81,73,.06)':'rgba(88,166,255,.04)'}, transparent)`,
                pointerEvents:'none',transition:'background .5s',
              }}/>

              <div style={{fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--dim)',marginBottom:'8px'}}>
                {count > 0 ? 'POSITIVE' : count < 0 ? 'NEGATIVE' : 'ZERO'}
              </div>

              <div style={{
                fontFamily:'Cormorant Garamond, serif',
                fontWeight:700,fontSize:'6rem',lineHeight:1,
                letterSpacing:'-.02em',
                ...displayStyle,
                display:'inline-block',
              }}>
                {count}
              </div>

              <div style={{fontSize:'10px',color:'var(--dim)',marginTop:'12px',letterSpacing:'.1em'}}>
                step: <span style={{color:'var(--orange)'}}>{step}</span> · 
                history: <span style={{color:'var(--blue)'}}>{history.length}</span>
              </div>
            </div>

            {/* Step Control */}
            <div style={{
              padding:'14px 24px',
              borderBottom:'1px solid var(--border)',
              display:'flex',alignItems:'center',gap:'10px',
              background:'var(--bg3)',
            }}>
              <span style={{fontSize:'9px',color:'var(--dim)',letterSpacing:'.15em',textTransform:'uppercase'}}>Step</span>
              {[1,5,10,25,100].map(s => (
                <button key={s} onClick={()=>setStep(s)} style={{
                  padding:'4px 12px',borderRadius:'4px',
                  fontFamily:'DM Mono, monospace',fontSize:'11px',
                  cursor:'pointer',transition:'all .15s',
                  border: step===s ? '1px solid var(--orange)' : '1px solid var(--border)',
                  background: step===s ? 'rgba(255,166,87,.12)' : 'transparent',
                  color: step===s ? 'var(--orange)' : 'var(--dim)',
                }}>
                  {s}
                </button>
              ))}
              <button onClick={()=>setShowCustom(v=>!v)} style={{
                marginLeft:'auto',padding:'4px 12px',
                fontFamily:'DM Mono, monospace',fontSize:'9px',
                letterSpacing:'.1em',textTransform:'uppercase',
                cursor:'pointer',border:'1px solid var(--border)',
                background:'transparent',color:'var(--dim)',borderRadius:'4px',
                transition:'all .15s',
              }}>
                {showCustom ? 'cancel' : 'custom'}
              </button>
            </div>

            {/* Custom Input */}
            {showCustom && (
              <div style={{
                padding:'12px 24px',borderBottom:'1px solid var(--border)',
                display:'flex',gap:'8px',background:'var(--bg3)',
              }}>
                <input
                  type="number"
                  value={customVal}
                  onChange={e=>setCustomVal(e.target.value)}
                  onKeyDown={e=>e.key==='Enter'&&applyCustom()}
                  placeholder="set count to..."
                  autoFocus
                  style={{
                    flex:1,background:'var(--bg2)',border:'1px solid var(--border)',
                    color:'var(--text)',fontFamily:'DM Mono, monospace',
                    fontSize:'12px',padding:'8px 12px',borderRadius:'6px',outline:'none',
                  }}
                />
                <button onClick={applyCustom} style={{
                  padding:'8px 16px',background:'var(--blue)',color:'#fff',
                  border:'none',borderRadius:'6px',fontFamily:'DM Mono, monospace',
                  fontSize:'10px',cursor:'pointer',letterSpacing:'.1em',
                }}>Set</button>
              </div>
            )}

            {/* Buttons */}
            <div style={{padding:'20px 24px',display:'flex',gap:'10px'}}>
              <button onClick={decrement} style={{
                flex:1,height:'56px',borderRadius:'10px',
                fontFamily:'DM Mono, monospace',fontSize:'22px',
                cursor:'pointer',border:'1px solid var(--border)',
                background:'rgba(248,81,73,.1)',color:'var(--red)',
                transition:'all .15s',
              }}
              onMouseEnter={e=>e.currentTarget.style.background='rgba(248,81,73,.2)'}
              onMouseLeave={e=>e.currentTarget.style.background='rgba(248,81,73,.1)'}
              >−</button>

              <button onClick={reset} style={{
                width:'56px',height:'56px',borderRadius:'10px',
                fontFamily:'DM Mono, monospace',fontSize:'16px',
                cursor:'pointer',border:'1px solid var(--border)',
                background:'var(--bg3)',color:'var(--dim)',
                transition:'all .15s',
              }}>↺</button>

              <button onClick={undo} disabled={history.length < 2} style={{
                width:'56px',height:'56px',borderRadius:'10px',
                fontFamily:'DM Mono, monospace',fontSize:'14px',
                cursor: history.length < 2 ? 'not-allowed' : 'pointer',
                border:'1px solid var(--border)',
                background:'var(--bg3)',
                color: history.length < 2 ? 'var(--border)' : 'var(--orange)',
                transition:'all .15s',
              }}>⤺</button>

              <button onClick={increment} style={{
                flex:1,height:'56px',borderRadius:'10px',
                fontFamily:'DM Mono, monospace',fontSize:'22px',
                cursor:'pointer',border:'none',
                background:'var(--green)',color:'#fff',
                transition:'all .15s',
                boxShadow:'0 4px 16px rgba(63,185,80,.25)',
              }}
              onMouseEnter={e=>e.currentTarget.style.background='#45c957'}
              onMouseLeave={e=>e.currentTarget.style.background='var(--green)'}
              >+</button>
            </div>

            {/* Keyboard Hint */}
            <div style={{
              padding:'8px 24px 14px',
              display:'flex',gap:'8px',flexWrap:'wrap',
            }}>
              {['↑/+ increment','↓/− decrement','R reset','Ctrl+Z undo'].map(h=>(
                <span key={h} style={{
                  fontSize:'8px',color:'var(--dim)',letterSpacing:'.08em',
                  border:'1px solid var(--border)',padding:'2px 7px',borderRadius:'3px',
                }}>{h}</span>
              ))}
            </div>
          </div>

          {/* History Panel */}
          <div style={{
            background:'var(--bg2)',border:'1px solid var(--border)',
            borderRadius:'12px',overflow:'hidden',
          }}>
            <div style={{
              display:'flex',justifyContent:'space-between',alignItems:'center',
              padding:'12px 16px',borderBottom:'1px solid var(--border)',
            }}>
              <span style={{fontSize:'9px',letterSpacing:'.2em',textTransform:'uppercase',color:'var(--dim)'}}>
                Action History ({history.length}/20)
              </span>
              <div style={{display:'flex',gap:'8px'}}>
                <button onClick={()=>setShowHistory(v=>!v)} style={{
                  fontSize:'9px',letterSpacing:'.1em',textTransform:'uppercase',
                  padding:'4px 10px',border:'1px solid var(--border)',
                  background:'transparent',color:'var(--dim)',cursor:'pointer',borderRadius:'4px',
                }}>
                  {showHistory ? 'hide' : 'show'}
                </button>
                <button onClick={()=>setHistory([])} style={{
                  fontSize:'9px',letterSpacing:'.1em',textTransform:'uppercase',
                  padding:'4px 10px',border:'1px solid var(--border)',
                  background:'transparent',color:'var(--red)',cursor:'pointer',borderRadius:'4px',
                }}>
                  clear
                </button>
              </div>
            </div>

            {showHistory && (
              <div style={{maxHeight:'240px',overflowY:'auto'}}>
                {history.length === 0 ? (
                  <div style={{
                    padding:'24px',textAlign:'center',
                    fontSize:'10px',color:'var(--dim)',letterSpacing:'.1em',
                  }}>
                    No actions yet. Start clicking!
                  </div>
                ) : (
                  history.map((item, i) => (
                    <HistoryItem key={i} item={item} index={i} onRestore={restore} />
                  ))
                )}
              </div>
            )}
          </div>

          {/* Footer */}
          <div style={{
            textAlign:'center',marginTop:'20px',
            fontSize:'9px',color:'var(--dim)',letterSpacing:'.12em',
          }}>
            Built by{' '}
            <a href="https://www.linkedin.com/in/forkaifansari" target="_blank"
              style={{color:'var(--blue)',textDecoration:'none'}}>Kaif Ansari</a>
            {' · '}
            <a href="https://github.com/forkaifansari/365-days-of-code" target="_blank"
              style={{color:'var(--blue)',textDecoration:'none'}}>GitHub →</a>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
